name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── API Contract & Typed Client ──────────────────────────────────────────
  api-contract:
    name: API Contract (OpenAPI + Typed Client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Verify OpenAPI snapshot and generated typed client are in sync
        run: npm --prefix frontend run openapi:check

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build (skip tests)
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ── AI Service ────────────────────────────────────────────────────────────
  ai:
    name: AI Service (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.lock.txt || pip install -r requirements.txt

      - name: Syntax check (all route files)
        run: |
          python -m py_compile main.py
          python -m py_compile config.py
          python -m py_compile request_id.py
          for f in routes/*.py; do python -m py_compile "$f"; done

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --select=E,F,W --ignore=E501,E402,F401

      - name: Run unit tests (pytest)
        run: pytest -q

  # ── Full Stack API Smoke (Docker Compose) ───────────────────────────────
  e2e:
    name: Full Stack Smoke (API + Browser)
    runs-on: ubuntu-latest
    needs: [api-contract, frontend, backend, ai]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies for browser E2E
        run: npm --prefix frontend ci

      - name: Prepare CI .env
        run: |
          cat > .env << 'EOF'
          # Docker / DB
          POSTGRES_DB=stock_ai
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres

          # Backend DB connection (container-to-container)
          DB_URL=jdbc:postgresql://postgres:5432/stock_ai
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          DB_DRIVER_CLASS_NAME=org.postgresql.Driver
          SPRING_PROFILES_ACTIVE=prod,postgres
          JPA_DDL_AUTO=validate
          FLYWAY_ENABLED=true
          FLYWAY_BASELINE_VERSION=2

          # App security/settings
          JWT_SECRET=ci-jwt-secret-32-bytes-minimum-value-1234567890
          REFRESH_TOKEN_PEPPER=ci-pepper
          TOTP_ENCRYPTION_KEY=ci-totp-encryption-key-32-bytes-1234567890
          AI_INTERNAL_SERVICE_TOKEN=ci-internal-service-token
          APP_CORS_ALLOWED_ORIGIN_PATTERNS=http://localhost,http://127.0.0.1
          REFRESH_TOKEN_COOKIE_SECURE=false
          REFRESH_TOKEN_COOKIE_SAME_SITE=Lax

          # AI config (safe defaults for CI)
          ENVIRONMENT=ci
          DATA_PROVIDER=yfinance
          LLM_PROVIDER=ollama
          OLLAMA_BASE_URL=http://host.docker.internal:11434
          OLLAMA_MODEL=llama3.1:8b
          ALPHAVANTAGE_API_KEY=dummy
          OPENAI_API_KEY=dummy
          FINNHUB_API_KEY=

          # Optional monitoring/env
          SENTRY_DSN_BACKEND=
          SENTRY_DSN_AI=
          GRAFANA_USER=admin
          GRAFANA_PASSWORD=admin
          EOF

      - name: Build and start full stack
        run: docker compose up -d --build

      - name: Run API smoke flows
        run: python3 scripts/e2e_smoke.py
        env:
          E2E_REPORT_PATH: artifacts/reports/e2e-core-flows.json

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke flows
        working-directory: frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost

      - name: Upload E2E report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-flow-report
          path: artifacts/reports/e2e-core-flows.json
          if-no-files-found: warn

      - name: Upload browser E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results/playwright
          if-no-files-found: warn

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Teardown stack
        if: always()
        run: docker compose down -v
