services:
  - type: pserv
    name: stock-ai-ai
    runtime: docker
    dockerfilePath: ./ai/Dockerfile
    dockerContext: ./ai
    healthCheckPath: /health
    envVars:
      - key: DATA_PROVIDER
        value: yfinance
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

  - type: keyvalue
    name: stock-ai-redis

  - type: web
    name: stock-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_PEPPER
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: AI_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: stock-ai-ai
          property: hostport
      - key: SPRING_DATA_REDIS_URL
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: connectionString

  - type: web
    name: stock-ai-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
