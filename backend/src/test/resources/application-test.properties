# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT config
security.jwt.secret=test-secret-change-me-test-secret-change-me-123456
security.jwt.expMinutes=60

# AI service mock URL (will be mocked in tests)
ai.baseUrl=http://localhost:8000

# Disable Redis - use simple cache for tests
spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable actuator endpoints that require Redis
management.health.redis.enabled=false

# Valuation properties
valuation.ratios.pe.low=12.0
valuation.ratios.pe.high=35.0
valuation.ratios.pe.weight=0.60
valuation.ratios.ps.low=2.0
valuation.ratios.ps.high=10.0
valuation.ratios.ps.weight=0.25
valuation.ratios.pb.low=1.5
valuation.ratios.pb.high=8.0
valuation.ratios.pb.weight=0.15
valuation.growth.yoyMaxBonus=15.0
valuation.growth.yoyCap=0.20
valuation.dcf.enabled=true
valuation.dcf.discount-rate=0.09
valuation.dcf.terminal-growth=0.025
valuation.dcf.projection-years=5
valuation.dcf.score-max-bonus=10.0

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.sw103302.backend=DEBUG
