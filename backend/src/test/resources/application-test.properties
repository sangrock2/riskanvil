security.rate-limit.enabled=false
spring.datasource.url=jdbc:h2:mem:stock_ai_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

spring.cache.type=simple
management.health.redis.enabled=false

quote.websocket.relay.enabled=false
security.jwt.secret=test-only-jwt-secret-minimum-32-bytes!!
security.totp.encryption-key=test-only-totp-encryption-key-minimum-32-bytes
ai.internal.service-token=test-only-ai-internal-service-token
security.refresh-token.cookie-secure=false
security.refresh-token.cookie-same-site=Lax
