# =====================================================================
# PostgreSQL profile overrides
# Render managed Postgres(16+) 배포용
# 사용 예: SPRING_PROFILES_ACTIVE=prod,postgres
# =====================================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOSTPORT:localhost:5432}/${DB_NAME:stock_ai}}
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# MySQL용 Flyway 스크립트 충돌 방지를 위해 Postgres 프로필에서는 기본 비활성화
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# 신규 Postgres 인스턴스 부팅 시 엔티티 기반 스키마 자동 생성/갱신
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
