# =====================================================================
# PostgreSQL profile overrides
# Render managed Postgres(16+) 배포용
# 사용 예: SPRING_PROFILES_ACTIVE=prod,postgres
# Postgres 전용 Flyway baseline(V1, V2) 기준으로 신규 DB를 초기화한다.
# 기존 운영 DB는 baseline-on-migrate + baseline-version=2로 스키마를 건드리지 않고
# flyway_schema_history만 맞춘 뒤 이후 버전부터 추적한다.
# =====================================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOSTPORT:localhost:5432}/${DB_NAME:stock_ai}}
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Postgres 운영/스테이징은 Flyway를 기본 활성화
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration-postgres}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:2}

# prod 기본 정책과 맞추어 스키마 변경은 금지하고 검증만 수행
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
