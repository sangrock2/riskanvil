# =====================================================================
# Production-specific overrides
# 배포 시 반드시 SPRING_PROFILES_ACTIVE=prod 환경변수 주입 필요
# =====================================================================

# DB Schema: Flyway가 마이그레이션을 담당. 자동 DDL 수정 비활성화
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# SQL 로깅 비활성화 (성능 + 정보 유출 방지)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# 에러 응답에서 스택 트레이스 및 내부 메시지 제거 (정보 유출 방지)
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

# Flyway 로깅 간소화
logging.level.org.flywaydb=WARN
logging.level.org.springframework.boot.autoconfigure.flyway=WARN
logging.level.org.springframework.http.codec=WARN
logging.level.org.hibernate.tool.schema=WARN

# Actuator: 프로덕션에서 health 상세 정보 인가된 사용자만 조회
management.endpoint.health.show-details=when_authorized

# HTTP codec 로깅 비활성화
logging.level.org.springframework.http.codec=WARN

# CORS origins must be explicitly configured in production (comma-separated)
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://your-frontend-domain.com}

# Production hardening defaults
app.security.expose-docs=${APP_SECURITY_EXPOSE_DOCS:false}
app.security.expose-prometheus=${APP_SECURITY_EXPOSE_PROMETHEUS:false}
app.security.expose-actuator-info=${APP_SECURITY_EXPOSE_ACTUATOR_INFO:false}

# AI client retry/timeout (production baseline)
ai.client.retry.attempts=${AI_CLIENT_RETRY_ATTEMPTS:1}
ai.client.retry.report-attempts=${AI_CLIENT_RETRY_REPORT_ATTEMPTS:0}
