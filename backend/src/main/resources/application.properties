spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:${SERVER_PORT:8080}}

# AI service
ai.baseUrl=${AI_BASE_URL:http://${AI_SERVICE_HOSTPORT:localhost:8000}}

# Database (default: MySQL for local/docker-compose)
# \uC6B0\uC120\uC21C\uC704: DB_URL -> DB_HOSTPORT -> \uAE30\uBCF8\uAC12
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOSTPORT:localhost:3306}/${MYSQL_DATABASE:stock_ai}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:ghkdakd*12}}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA (DB \uB9C8\uC774\uADF8\uB808\uC774\uC158 \uB3C4\uAD6C\uAC00 \uC544\uC9C1 \uC5C6\uC73C\uB2C8, \uB85C\uCEEC \uAC1C\uBC1C\uC6A9\uC73C\uB85C update \uAD8C\uC7A5)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT (\uAC1C\uBC1C\uC6A9 - \uC6B4\uC601\uC5D0\uC11C\uB294 \uBC18\uB4DC\uC2DC \uAE38\uACE0 \uB79C\uB364\uD558\uAC8C)
# CRITICAL: For production, set JWT_SECRET environment variable to a cryptographically secure random string (min 32 bytes)
# Generate with: openssl rand -base64 32
security.jwt.secret=${JWT_SECRET:dev-only-change-in-production-use-strong-random-secret-minimum-32-bytes-required}
# Access token validity: 15 minutes (short-lived for security)
# Refresh token validity: 7 days (configured in AuthService)
security.jwt.expMinutes=${JWT_EXP_MINUTES:15}
security.refresh-token.pepper=${REFRESH_TOKEN_PEPPER:}
security.refresh-token.cleanup-cron=${REFRESH_TOKEN_CLEANUP_CRON:0 */30 * * * *}

# Redis (optional - will fall back to in-memory cache if unavailable)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.cache.type=${SPRING_CACHE_TYPE:simple}
# Continue application startup even if Redis is unavailable
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.shutdown-timeout=100ms
# Redis Repository\uB97C \uC0AC\uC6A9\uD558\uC9C0 \uC54A\uC73C\uBBC0\uB85C \uC2A4\uCE94 \uBE44\uD65C\uC131\uD654 (\uC2DC\uC791 \uB85C\uADF8 \uB178\uC774\uC988 \uAC10\uC18C)
spring.data.redis.repositories.enabled=false

services.redis.image=redis:7-alpine
services.redis.ports[0]=6379:6379

# actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:when_authorized}
management.metrics.tags.application=stock-ai-backend
management.info.env.enabled=true
management.info.git.enabled=true
management.info.build.enabled=true
info.app.name=stock-ai-backend
info.app.environment=${SPRING_PROFILES_ACTIVE:dev}
info.app.version=${APP_VERSION:local}

# Kubernetes probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}

# Server Settings
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Error handling (\uD504\uB85C\uB355\uC158\uC5D0\uC11C\uB294 never\uB85C \uC124\uC815)
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.sw103302.backend=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE:INFO}
logging.level.org.flywaydb=${LOG_LEVEL_FLYWAY:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %X{requestId} %logger{36} - %msg%n

logging.level.org.springframework.boot.autoconfigure.flyway=INFO
logging.level.org.springframework.http.codec=INFO
logging.level.org.hibernate.tool.schema=INFO

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}

# Security exposure defaults (override by env in deployment)
app.security.expose-docs=${APP_SECURITY_EXPOSE_DOCS:false}
app.security.expose-prometheus=${APP_SECURITY_EXPOSE_PROMETHEUS:false}
app.security.expose-actuator-info=${APP_SECURITY_EXPOSE_ACTUATOR_INFO:false}

# Rate-limit IP header trust policy
security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.trust-x-forwarded-for=${SECURITY_RATE_LIMIT_TRUST_XFF:false}
security.rate-limit.trust-x-real-ip=${SECURITY_RATE_LIMIT_TRUST_X_REAL_IP:true}

# Valuation Settings
valuation.ratios.pe.low=12.0
valuation.ratios.pe.high=35.0
valuation.ratios.pe.weight=0.60

valuation.ratios.ps.low=2.0
valuation.ratios.ps.high=10.0
valuation.ratios.ps.weight=0.25

valuation.ratios.pb.low=1.5
valuation.ratios.pb.high=8.0
valuation.ratios.pb.weight=0.15

valuation.growth.yoyMaxBonus=15.0
valuation.growth.yoyCap=0.20

valuation.dcf.enabled=true
valuation.dcf.discount-rate=0.09
valuation.dcf.terminal-growth=0.025
valuation.dcf.projection-years=5
valuation.dcf.score-max-bonus=10.0

# Sentry \uC5D0\uB7EC \uBAA8\uB2C8\uD130\uB9C1 (SENTRY_DSN \uD658\uACBD\uBCC0\uC218\uAC00 \uC124\uC815\uB41C \uACBD\uC6B0\uC5D0\uB9CC \uD65C\uC131\uD654)
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.environment=${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=warn

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# SpringDoc OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# AI client timeout/retry policy
ai.client.timeout.default-seconds=${AI_CLIENT_TIMEOUT_DEFAULT_SECONDS:30}
ai.client.timeout.report-seconds=${AI_CLIENT_TIMEOUT_REPORT_SECONDS:180}
ai.client.retry.attempts=${AI_CLIENT_RETRY_ATTEMPTS:2}
ai.client.retry.report-attempts=${AI_CLIENT_RETRY_REPORT_ATTEMPTS:0}
ai.client.retry.backoff-millis=${AI_CLIENT_RETRY_BACKOFF_MILLIS:200}
ai.client.retry.max-backoff-millis=${AI_CLIENT_RETRY_MAX_BACKOFF_MILLIS:2000}
