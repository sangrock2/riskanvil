services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-stock_ai}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stock_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ── Application Services ─────────────────────────────────────────
  ai:
    build: ./ai
    expose:
      - "8000"
    environment:
      - DATA_PROVIDER=${DATA_PROVIDER:-yfinance}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - AI_INTERNAL_SERVICE_TOKEN=${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN must be set}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN_AI:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - AI_BASE_URL=http://ai:8000
      - AI_INTERNAL_SERVICE_TOKEN=${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN must be set}
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stock_ai}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod,postgres}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO:-validate}
      - FLYWAY_ENABLED=${FLYWAY_ENABLED:-true}
      - FLYWAY_BASELINE_VERSION=${FLYWAY_BASELINE_VERSION:-2}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - REFRESH_TOKEN_PEPPER=${REFRESH_TOKEN_PEPPER:?REFRESH_TOKEN_PEPPER must be set}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY must be set}
      - REFRESH_TOKEN_COOKIE_SECURE=${REFRESH_TOKEN_COOKIE_SECURE:-true}
      - REFRESH_TOKEN_COOKIE_SAME_SITE=Lax
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_CACHE_TYPE=${SPRING_CACHE_TYPE:-redis}
      - MANAGEMENT_HEALTH_REDIS_ENABLED=false
      - SENTRY_DSN=${SENTRY_DSN_BACKEND:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ── Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/opt/stock-ai-nginx:ro
    command: >-
      /bin/sh -c '
      if [ -f /opt/stock-ai-nginx/certs/fullchain.pem ] && [ -f /opt/stock-ai-nginx/certs/privkey.pem ]; then
        cp /opt/stock-ai-nginx/nginx.conf /etc/nginx/nginx.conf;
      else
        cp /opt/stock-ai-nginx/nginx.http.conf /etc/nginx/nginx.conf;
      fi;
      exec nginx -g "daemon off;";
      '
    depends_on:
      - frontend
      - backend
      - ai
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Monitoring ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:?GRAFANA_USER must be set}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
